<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" style="background: #050508;">
  <defs>
    <filter id="variable-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#variable-glow)" transform="translate(80, 100)">
    
    <path d="M 0 0 
             h 130 
             a 180 180 0 0 1 0 150 
             h -130 z" 
          fill="#ff5f1f" 
          opacity="0.35" />

    <path d="M 0 0 
             h 60 
             a 100 100 0 0 1 0 150 
             h -60 z" 
          fill="#00feff" 
          opacity="0.9" />
          
  </g>

  <text x="80" y="80" fill="white" font-family="monospace" font-size="12" font-weight="bold">VARIABLE PHASE: RADIUS MAX</text>
  <text x="80" y="280" fill="#ff5f1f" font-family="monospace" font-size="10">Temp: 5,500K (Min)</text>
  <text x="80" y="295" fill="#00ccff" font-family="monospace" font-size="10">Temp: 6,800K (Max)</text>
</svg>